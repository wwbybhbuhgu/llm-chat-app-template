<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI 智能助手 · Cloudflare Workers</title>
    <link rel="stylesheet" href="/style.css">
    <!-- Markdown 渲染与安全过滤 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="title">
                <h1>✨ AI 智能助手</h1>
                <span class="badge">Cloudflare Workers · Llama 3</span>
            </div>
            <button class="new-chat-btn" id="newChatBtn">➕ 新会话</button>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="message-content">
                    <div class="bubble">你好！我是智能助手，基于 Llama 3 模型。有什么可以帮助你的吗？</div>
                    <div class="timestamp"></div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"></textarea>
            <button id="sendBtn">发送</button>
        </div>
        <div class="info-footer">💡 多轮对话 | 自动保存历史 | 限流保护 (10次/分钟) | 支持 Markdown</div>
    </div>

    <script src="/chat.js"></script>
</body>
</html>
