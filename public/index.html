<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI 智能助手 · Cloudflare Workers</title>
    <link rel="stylesheet" href="/style.css">
    <!-- Markdown 渲染与安全过滤 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="title">
                <h1>AI 智能助手</h1>
                <span class="badge">Cloudflare Workers · 流式输出 · 多模型</span>
            </div>
            <div class="header-actions">
                <select id="modelSelect" class="model-select">
                    <!-- 低成本模型优先排列 -->
                    <option value="@cf/openai/gpt-5.4-pro">OpenAI GPT-5.4 Pro</option>
                    <option value="@hf/google/gemma-7b-it">Google Gemma 7B Instruct</option>
                    <option value="@cf/minimax/m2.7">Minimax M2.7</option>
                    <option value="@cf/alibaba/qwen3-max">Alibaba Qwen3-Max</option>
                    <!-- 其他常用模型 -->
                    <option value="@cf/meta/llama-3-8b-instruct" selected>Llama 3 8B Instruct</option>
                    <option value="@cf/mistral/mistral-7b-instruct-v0.1">Mistral 7B Instruct</option>
                    <option value="@hf/thebloke/deepseek-coder-6.7b-instruct-awq">DeepSeek Coder 6.7B</option>
                    <option value="@cf/meta/llama-2-7b-chat-int8">Llama 2 7B Chat</option>
                </select>
                <button class="new-chat-btn" id="newChatBtn">新会话</button>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message assistant">
                <div class="avatar">A</div>
                <div class="message-content">
                    <div class="bubble">你好！我是智能助手。有什么可以帮助你的吗？</div>
                    <div class="timestamp"></div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"></textarea>
            <button id="sendBtn">发送</button>
        </div>
        <div class="info-footer">多轮对话 | 自动保存历史 | 限流保护 (10次/分钟) | 支持 Markdown</div>
    </div>

    <script src="/chat.js"></script>
</body>
</html>
